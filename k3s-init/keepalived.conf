vrrp_script check_k3s {
    script "killall -0 k3s" # check_k3s
    interval 2
    weight 2
}

vrrp_instance VI_1 {
    state MASTER
    interface enp0s8          
    virtual_router_id 51    
    priority 100            
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass 1234      
    }

    virtual_ipaddress {
        192.168.10.200/24   
    }

    track_script {
        check_k3s
    }
}